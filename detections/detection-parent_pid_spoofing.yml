title: Suspicious Parent-Child Process Relationship (PPID Spoofing Indicator)
id: e1b8d3f7-5a92-4c61-8e0d-7a4c2f9b6d35
status: experimental
description: >
  Detects classic Windows utilities spawning from anomalous parents, a signal of
  Parent PID spoofing used to make malicious children appear to descend from trusted
  processes. Tune the parent/child pairs to your environment's baseline.
references:
  - https://attack.mitre.org/techniques/T1134/004/
author: Blue-Team Coverage Guide
date: 2026/06/09
tags:
  - attack.privilege_escalation
  - attack.defense_evasion
  - attack.t1134.004
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith:
      - '\cmd.exe'
      - '\powershell.exe'
      - '\rundll32.exe'
      - '\regsvr32.exe'
    ParentImage|endswith:
      - '\explorer.exe'      # spoofed to look user-launched
      - '\svchost.exe'
      - '\lsass.exe'
      - '\services.exe'
      - '\wininit.exe'
  filter_known_good:
    ParentImage|endswith: '\explorer.exe'
    Image|endswith: '\cmd.exe'
    User|contains: 'ADMIN'
  condition: selection and not filter_known_good
falsepositives:
  - Legitimate management/automation tooling. Baseline parent-child pairs before alerting.
level: medium
