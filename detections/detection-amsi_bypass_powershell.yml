title: AMSI Bypass Indicators in PowerShell
id: c9a4f6e1-1b27-4d8c-a0e5-3f7b9c2d18e4
status: experimental
description: >
  Detects in-memory AMSI tampering patterns commonly seen in PowerShell payloads —
  reflection against AmsiUtils / amsiInitFailed and direct references to AmsiScanBuffer.
  Attackers neutralize the Antimalware Scan Interface so that subsequent script content
  is never inspected. Pair with Script Block Logging (Event ID 4104).
references:
  - https://attack.mitre.org/techniques/T1562/001/
  - https://attack.mitre.org/techniques/T1059/001/
author: Blue-Team Coverage Guide
date: 2026/06/09
tags:
  - attack.defense_evasion
  - attack.execution
  - attack.t1562.001
  - attack.t1059.001
logsource:
  product: windows
  category: ps_script
  definition: 'Requires PowerShell Script Block Logging (EID 4104) enabled'
detection:
  selection:
    ScriptBlockText|contains:
      - 'amsiInitFailed'
      - 'AmsiUtils'
      - 'AmsiScanBuffer'
      - 'System.Management.Automation.AmsiUtils'
      - '[Ref].Assembly.GetType('
  condition: selection
falsepositives:
  - Security research and detection-tuning tooling run by the blue team itself.
level: high
